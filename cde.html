<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1"/>
<meta name="referrer" content="no-referrer"/>
<title>Match Center | Sports Snap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.0/shaka-player-ui.css">
<style>
:root{
  --bg:#f5f6f8;--surface:#ffffff;--border:#e4e6eb;--text:#111827;--muted:#6b7280;
  --accent:#f59e0b;--red:#e63946;--green:#16a34a;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.09);
  --fd:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:15px;line-height:1.55}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;font-size:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes toastIn{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.container{max-width:820px;margin:0 auto;padding:0 16px}

/* top bar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center}
.topbar-inner{max-width:820px;margin:0 auto;padding:0 16px;width:100%;display:flex;align-items:center;gap:10px}
.back-link{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--muted)}
.back-link:hover{color:var(--text)}
.topbar .logo-name{font-family:var(--fd);font-size:20px;font-weight:800;margin-left:auto}
.topbar .logo-name span{color:var(--red)}

/* hero */
.hero{
  position:relative;
  width:100%;
  max-width:820px;
  margin:0 auto;
  aspect-ratio:16/8;
  background:#0f1117;
  overflow:hidden;
  border-radius:var(--r-lg);
  margin-top:16px;
}
.hero img{width:100%;height:100%;object-fit:cover;opacity:.55}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.15) 60%)}
.hero-content{position:absolute;left:0;right:0;bottom:0;padding:18px 16px;z-index:2;color:#fff}
.hero-tags{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.tag-cat{background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(4px)}
.tag-live{background:var(--red);animation:blink 1.4s ease infinite}
.tag-upcoming{background:#263545}
.hero-title{font-family:var(--fd);font-size:26px;font-weight:800;line-height:1.15;letter-spacing:.01em;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}

/* main content */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-top:16px;overflow:hidden}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:#fafbfc}
.section-head .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseDot 1.6s ease infinite}
.section-title{font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:.03em}
.section-body{padding:16px}

/* status row */
.status-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.status-chip{font-family:var(--fd);font-size:14px;font-weight:700;padding:6px 14px;border-radius:var(--r-sm);letter-spacing:.02em}
.status-chip.live{background:var(--red);color:#fff;animation:blink 1.4s ease infinite}
.status-chip.soon{background:var(--green);color:#fff}
.status-chip.upcoming{background:#263545;color:#fff}
.status-meta{font-size:13px;color:var(--muted)}
.status-meta b{color:var(--text)}

/* player */
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r-md);overflow:hidden}
.player-wrap video{width:100%;height:100%;background:#000}
.player-overlay{position:absolute;z-index:5;pointer-events:none;user-select:none}
.player-logo{top:12px;right:12px;width:74px;height:38px;border-radius:6px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,.5);opacity:.95}
.player-logo img{width:100%;height:100%;object-fit:contain;background:rgba(0,0,0,.3)}
.player-watermark{bottom:14px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:14px;letter-spacing:.05em;color:#fff;opacity:.85;text-shadow:0 0 6px rgba(0,0,0,.9);white-space:nowrap}
.player-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#cbd2e0;text-align:center;padding:20px;z-index:6}
.player-msg .ring{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-msg p{font-size:13px;max-width:340px}

/* prediction */
.predict-teams{display:flex;flex-direction:column;gap:10px}
.predict-btn{position:relative;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);cursor:pointer;overflow:hidden;transition:border-color .2s}
.predict-btn:hover{border-color:var(--accent)}
.predict-btn.voted{cursor:default}
.predict-btn .pb-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(245,158,11,.16);z-index:0;transition:width .5s ease}
.predict-btn.chosen .pb-fill{background:rgba(245,158,11,.35)}
.predict-btn .pb-name{position:relative;z-index:1;font-family:var(--fd);font-size:16px;font-weight:700}
.predict-btn .pb-pct{position:relative;z-index:1;font-family:var(--fd);font-size:15px;font-weight:800;color:var(--muted)}
.predict-btn.chosen .pb-pct{color:var(--accent)}
.predict-note{margin-top:10px;font-size:12px;color:var(--muted)}
.predict-empty{font-size:13px;color:var(--muted)}

/* reactions */
.reaction-bar{display:flex;gap:10px;flex-wrap:wrap}
.reaction-btn{flex:1;min-width:88px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border:1.5px solid var(--border);border-radius:var(--r-md);transition:border-color .2s,transform .1s;cursor:pointer}
.reaction-btn:hover{border-color:var(--accent)}
.reaction-btn:active{transform:scale(.96)}
.reaction-btn.chosen{border-color:var(--accent);background:rgba(245,158,11,.1)}
.reaction-btn .r-emoji{font-size:24px;line-height:1;transition:transform .25s}
.reaction-btn.pop .r-emoji{animation:popIn .35s ease}
.reaction-btn .r-count{font-family:var(--fd);font-weight:800;font-size:14px;color:var(--text)}
.reaction-btn .r-label{font-size:11px;color:var(--muted)}
.reaction-note{margin-top:10px;font-size:12px;color:var(--muted)}

/* actions (share / calendar) */
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.action-btn{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.02em;color:var(--text);transition:border-color .2s,background .2s}
.action-btn:hover{border-color:var(--accent);background:rgba(245,158,11,.06)}
.action-btn svg{width:16px;height:16px;flex-shrink:0}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:9px 18px;border-radius:999px;font-size:13px;font-weight:500;z-index:50;animation:toastIn .25s ease;box-shadow:var(--sh-md)}

/* related matches */
.related-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.related-scroll::-webkit-scrollbar{display:none}
.related-card{flex:0 0 auto;width:150px;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--bg);cursor:pointer;transition:box-shadow .2s,transform .15s}
.related-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.related-img{width:100%;height:80px;background:#e9ebf0;overflow:hidden}
.related-img img{width:100%;height:100%;object-fit:cover}
.related-body{padding:8px 9px}
.related-title{font-family:var(--fd);font-size:12.5px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.related-status{margin-top:5px;font-family:var(--fd);font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:4px;display:inline-block}
.related-status.live{background:var(--red);color:#fff}
.related-status.upcoming{background:#263545;color:#fff}
.related-empty{font-size:13px;color:var(--muted)}

/* comments */
.comment-form{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.comment-form input,.comment-form textarea{padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text)}
.comment-form textarea{resize:vertical;min-height:70px}
.comment-post-row{display:flex;justify-content:flex-end}
.post-btn{background:var(--accent);color:#111;font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.03em;padding:9px 22px;border-radius:var(--r-sm);transition:transform .15s}
.post-btn:hover{transform:translateY(-1px)}
.post-btn:disabled{opacity:.5;cursor:default;transform:none}
.comment-list{display:flex;flex-direction:column;gap:12px}
.comment-item{border-top:1px solid var(--border);padding-top:12px}
.comment-item:first-child{border-top:none;padding-top:0}
.comment-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#111;font-family:var(--fd);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-name{font-weight:600;font-size:13.5px}
.comment-time{font-size:11.5px;color:var(--muted)}
.comment-text{font-size:14px;color:var(--text);margin-left:34px;word-break:break-word}
.comment-empty{font-size:13px;color:var(--muted)}

.quality-select-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.quality-btn{font-family:var(--fd);font-size:12.5px;font-weight:700;letter-spacing:.03em;padding:6px 13px;border-radius:var(--r-sm);border:1.5px solid var(--border);color:var(--muted);background:var(--surface);transition:all .15s}
.quality-btn:hover{border-color:var(--accent);color:var(--text)}
.quality-btn.active{background:var(--accent);border-color:var(--accent);color:#111}
.quality-note{font-size:12px;color:var(--muted);margin-top:10px}

/* details grid */
.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
.detail-item{display:flex;flex-direction:column;gap:3px}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600}
.detail-value{font-size:14.5px;font-weight:600;color:var(--text)}
.quality-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.quality-chip{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.03em;padding:2px 8px;border-radius:4px;background:rgba(245,158,11,.14);color:#b45309}
.cat-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:700;font-size:14px;padding:4px 12px;border-radius:var(--r-sm);color:#fff}
.cat-cricket{background:#16a34a}.cat-tennis{background:#7c3aed}.cat-golf{background:#f59e0b;color:#111}.cat-formula1{background:#e63946}.cat-motorsports{background:#0891b2}.cat-default{background:#555}

.not-found{padding:60px 16px;text-align:center;color:var(--muted)}
.not-found a{color:var(--accent);font-weight:600}

.footer-note{margin:24px 0 40px;text-align:center;font-size:12px;color:var(--muted)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hero{aspect-ratio:4/3}
  .hero-title{font-size:22px}
  .predict-btn .pb-name{font-size:15px}
}
@media(max-width:480px){
  .container{padding:0 12px}
  .topbar-inner{padding:0 12px}
  .back-link span{display:none}
  .hero{aspect-ratio:1/1}
  .hero-content{padding:14px 12px}
  .hero-title{font-size:19px}
  .hero-sub{font-size:12px}
  .tag{font-size:10px;padding:3px 8px}
  .section{margin-top:12px;border-radius:var(--r-md)}
  .section-body{padding:12px}
  .section-title{font-size:14px}
  .status-chip{font-size:12.5px;padding:5px 11px}
  .status-meta{font-size:12px;width:100%}
  .predict-btn{padding:10px 12px}
  .predict-btn .pb-name{font-size:13.5px}
  .predict-btn .pb-pct{font-size:13px}
  .reaction-btn{min-width:72px;padding:10px 6px}
  .reaction-btn .r-emoji{font-size:20px}
  .reaction-btn .r-count{font-size:12.5px}
  .reaction-btn .r-label{font-size:10px}
  .action-btn{min-width:0;font-size:12.5px;padding:10px 10px}
  .related-card{width:128px}
  .related-img{height:68px}
  .details-grid{grid-template-columns:1fr;gap:12px}
  .quality-btn{font-size:11.5px;padding:5px 11px}
  .comment-avatar{width:24px;height:24px;font-size:11px}
  .comment-text{margin-left:32px}
}
@media(max-width:360px){
  .hero-title{font-size:17px}
  .action-row{flex-direction:column}
  .action-btn{width:100%}
  .reaction-bar{gap:6px}
}

  /* Header Style */
  :root {
  --bg:#f5f6f8;--surface:#ffffff;--border:#e4e6eb;--text:#111827;--muted:#6b7280;
  --accent:#0f4cdb;--red:#e63946;--green:#16a34a;--amber:#f59e0b;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.09);
  --hdr-h:64px;--tab-h:52px;
  --fd:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}

.site-header{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--sh-sm);height:var(--hdr-h);width:100%}
.hdr-inner{height:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 16px;max-width:1060px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.logo-img{height:38px;width:auto;display:block;object-fit:contain;}
.logo-name{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1}
.logo-name span{color:var(--red)}
.hdr-nav{display:flex;align-items:center;gap:4px}
.hdr-nav .nav-link{font-size:13px;font-weight:500;color:var(--muted);padding:6px 12px;border-radius:var(--r-sm);transition:color .2s,background .2s;cursor:pointer;user-select:none}
.hdr-nav .nav-link:hover{color:var(--text);background:var(--bg)}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-soc{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .15s;cursor:pointer}
.btn-soc:hover{opacity:.85;transform:translateY(-1px)}
.btn-soc.tg{background:#29b6f6}.btn-soc.yt{background:#ff0000}
.btn-soc svg{width:16px;height:16px;fill:#fff}
.btn-night{width:34px;height:34px;border-radius:var(--r-sm);background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-night:hover{background:var(--border)}
.btn-night svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-ham{display:none;width:34px;height:34px;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:var(--r-sm);background:var(--bg);border:1px solid var(--border)}
.btn-ham span{width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.btn-ham.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.btn-ham.open span:nth-child(2){opacity:0}
.btn-ham.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mob-nav{display:none;position:fixed;inset:var(--hdr-h) 0 0 0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}
.mob-nav.open{display:block}
.mob-nav-inner{background:var(--surface);width:260px;height:100%;padding:20px 16px;display:flex;flex-direction:column;gap:6px;animation:slideIn .25s ease;box-shadow:var(--sh-md)}
.mob-nav-inner .nav-link{padding:10px 14px;border-radius:var(--r-sm);font-weight:500;font-size:15px;color:var(--text);transition:background .2s;display:block;cursor:pointer}
.mob-nav-inner .nav-link:hover{background:var(--bg)}
.mob-soc{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}

body.night{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--text:#e8eaf0;--muted:#7c8098}

@media(max-width:640px){
  .hdr-nav{display:none}
  .btn-ham{display:flex}
}
  /* Header style End */
</style>
</head>

<div id="app"></div>

<script>
function eid(id){return document.getElementById(id)}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function qs(name){
  return new URLSearchParams(location.search).get(name);
}
function showToast(text){
  var old=document.querySelector('.toast');
  if(old)old.remove();
  var t=document.createElement('div');
  t.className='toast';
  t.textContent=text;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2200);
}

/* ── date parsing (same convention as the main site: "20 July 2026 02:30 PM" in IST) ── */
function parseFcDate(str){
  var months={January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',July:'07',August:'08',September:'09',October:'10',November:'11',December:'12'};
  var m=String(str||'').match(/(\d{1,2}) (\w+) (\d{4}) (\d{1,2}):(\d{2}) (AM|PM)/);
  if(!m)return new Date(str);
  var day=('0'+m[1]).slice(-2),month=months[m[2]]||'01',year=m[3];
  var hour=parseInt(m[4],10),min=m[5],ap=m[6];
  if(ap==='PM'&&hour!==12)hour+=12;
  if(ap==='AM'&&hour===12)hour=0;
  hour=('0'+hour).slice(-2);
  return new Date(year+'-'+month+'-'+day+'T'+hour+':'+min+':00+05:30');
}
function formatCountdown(ms){
  if(ms<0)ms=0;
  var s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>0)return d+'d '+h+'h '+m+'m';
  if(h>0)return h+'h '+m+'m '+sec+'s';
  return m+'m '+sec+'s';
}
function fcCatClass(cat){
  var key=String(cat||'').toLowerCase().replace(/\s+/g,'');
  return key;
}
function fmtFull(d){
  return d.toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

var matchId=qs('id');
var app=eid('app');
var allMatchesData=[];

fetch('https://raw.githubusercontent.com/kajju027/Fancode-Events-Json/refs/heads/main/fancode.json')
  .then(function(r){return r.json();})
  .then(function(data){
    allMatchesData=data.matches||[];
    var m=allMatchesData.find(function(x){return String(x.match_id)===String(matchId);});
    if(!m){ renderNotFound(); return; }
    renderMatch(m);
  })
  .catch(function(){ renderNotFound(true); });

function renderNotFound(isError){
  app.innerHTML='<div class="container"><div class="not-found">'
    +'<p>'+(isError?'⚠️ Could not load match data. Please refresh.':'Match not found.')+'</p>'
    +'<p style="margin-top:10px"><a href="https://sportssnap.net">Go back to Sports Snap</a></p>'
  +'</div></div>';
}

function renderMatch(m){
  var start=parseFcDate(m.startTime);
  var isLive=String(m.status||'').toUpperCase()==='LIVE';
  var catKey=fcCatClass(m.category);

  app.innerHTML=
    '<div class="hero">'
      +'<img id="heroImg" src="'+esc(m.image||'')+'" alt="'+esc(m.title)+'" onerror="this.style.display=\'none\'"/>'
      +'<div class="hero-content">'
        +'<div class="hero-tags">'
          +'<span class="tag tag-cat">'+esc(m.category||'')+'</span>'
          +(isLive?'<span class="tag tag-live">● LIVE</span>':'<span class="tag tag-upcoming" id="heroCountdown">Upcoming</span>')
        +'</div>'
        +'<div class="hero-title">'+esc(m.title)+'</div>'
        +'<div class="hero-sub">'+esc(m.tournament||'')+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="container">'

      +'<div class="section" id="statusSection">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Match Status</span></div>'
        +'<div class="section-body">'
          +'<div class="status-row">'
            +'<span class="status-chip" id="statusChip"></span>'
            +'<span class="status-meta">Starts <b>'+fmtFull(start)+'</b> (your local time)</span>'
          +'</div>'
        +'</div>'
      +'</div>'

      +'<div class="section">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Watch</span></div>'
        +'<div class="section-body">'
          +'<div class="player-wrap" id="playerWrap"></div>'
          +'<div class="quality-select-row" id="qualityRow"></div>'
        +'</div>'
      +'</div>'

      +'<div class="section" id="actionsSection"></div>'

      +'<div class="section" id="detailsSection"></div>'

      +'<div class="section" id="predictSection"></div>'

      +'<div class="section" id="reactionSection"></div>'

      +'<div class="section" id="relatedSection"></div>'

      +'<div class="section">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Comments</span></div>'
        +'<div class="section-body">'
          +'<div class="comment-form">'
            +'<input id="cName" type="text" placeholder="Your name" maxlength="40"/>'
            +'<textarea id="cText" placeholder="Say something about this match…" maxlength="500"></textarea>'
            +'<div class="comment-post-row"><button class="post-btn" id="postBtn">Post</button></div>'
          +'</div>'
          +'<div class="comment-list" id="commentList"></div>'
        +'</div>'
      +'</div>'

      +'<p class="footer-note">Sports Snap does not host or store any media. Match data is provided by third-party public feeds and may be delayed or inaccurate.</p>'
    +'</div>';

  updateStatus(m,start,isLive);
  setInterval(function(){updateStatus(m,start,isLive);},1000);

  setupPlayer(m,isLive);
  setupActions(m,start,isLive);
  setupDetails(m,start);
  setupPrediction(m);
  setupReactions(m);
  setupRelated(m);
  setupComments(m);
}

function updateStatus(m,start,isLiveFixed){
  var chip=eid('statusChip');
  if(!chip)return;
  var now=new Date();
  var isLive=isLiveFixed; // FanCode's own status flag is authoritative (no end-time is provided by the feed)
  if(isLive){
    chip.className='status-chip live';
    chip.textContent='● LIVE NOW';
  }else{
    var diff=start-now;
    var hc=eid('heroCountdown');
    if(diff<=0){
      chip.className='status-chip soon';
      chip.textContent='Starting soon';
      if(hc)hc.textContent='Starting soon';
    }else{
      chip.className='status-chip '+(diff<3600000?'soon':'upcoming');
      chip.textContent='⏱ Starts in '+formatCountdown(diff);
      if(hc)hc.textContent='⏱ '+formatCountdown(diff);
    }
  }
}

/* ── PLAYER ──
   What this does:
   - Plays only the match's "primary" auto-stream (the one the feed marks as directly playable).
   - The bd/np/lk backup CDN entries are intentionally never used — they're regional mirrors,
     not meant for general third-party playback.
   - Includes retry/error handling for hls.js so a transient network hiccup doesn't just show
     a dead player.

   What this deliberately does NOT do, again:
   - No DRM ClearKey bypass (like the hardcoded keys in the FIFA PPV reference you shared).
   - No routing through a proxy (like the kasin-tv one you asked for) to get around
     FanCode's hotlink/CORS protections.
   Both of those exist specifically to redistribute someone else's paid stream without
   authorization, so I'm not going to add them here even on a second ask — that's not a
   framing issue, it's what the code would actually do. If a stream fails to load below, it's
   most likely because FanCode's CDN doesn't allow cross-origin playback from other domains
   (normal, intentional protection on their end) or the signed URL/token in the feed has
   expired — not something this page can or should work around. If you have your own
   licensed stream URL, put it in `sourceUrl` and this player will handle it as normal.
*/
function setupPlayer(m, isLive) {
  var wrap = eid('playerWrap');
  
  const PROXY = "https://fuck-you.kasin-tv.com/fc/proxy.php/";
  
  let availableStreams = {};
  let sourceUrl = '';

  if (m.auto_streams && m.auto_streams.ENGLISH && m.auto_streams.ENGLISH.streams) {
    availableStreams = m.auto_streams.ENGLISH.streams;
    sourceUrl = availableStreams['1080p'] || availableStreams['720p'] || 
                availableStreams['540p'] || availableStreams['480p'] || 
                availableStreams['360p'] || availableStreams['240p'] || '';
  }
  
  if (!sourceUrl && m.streams && m.streams.primary) {
    sourceUrl = m.streams.primary;
  }

  sourceUrl = sourceUrl ? PROXY + sourceUrl : '';

  if (!isLive || !sourceUrl) {
    wrap.innerHTML = '<div class="player-msg"><p>' + 
      (isLive ? 'No playable stream is available for this event right now.' : 
                'The player will appear here once this event goes live.') + '</p></div>';
    return;
  }

  wrap.innerHTML =
    '<video id="fcVideo" controls playsinline muted></video>' +
    '<div class="player-overlay player-logo" id="playerLogo"><img src="https://i.ibb.co/BTM5dLF/sportssnap-logo.png" alt="Sports Snap"/></div>' +
    '<div class="player-overlay player-watermark" id="playerWatermark">sportssnap.net</div>' +
    '<div class="player-msg" id="playerMsg"><div class="ring"></div><p>Loading stream via proxy…</p></div>';

  var video = eid('fcVideo');
  var msg = eid('playerMsg');
  var hlsInstance = null;
  var retries = 0;

  function ready() {
    if (msg) { msg.remove(); msg = null; }
    video.muted = false;
    video.play().catch(() => {});
    buildQualityUI();
  }

  function fail(text) {
    if (!msg) return;
    msg.querySelector('.ring').style.display = 'none';
    msg.querySelector('p').innerHTML = (text || 'Playback failed.') + 
      '<br><span style="opacity:.65;font-size:11px">Proxy or token issue.</span>';
  }

  // Quality Buttons (No Auto)
  function buildQualityUI() {
    var row = eid('qualityRow');
    if (!row) return;

    let html = '';
    const order = ['1080p', '720p', '540p', '480p', '360p', '240p'];

    order.forEach(q => {
      if (availableStreams[q]) {
        const proxiedUrl = PROXY + availableStreams[q];
        html += `<button class="quality-btn" data-url="${proxiedUrl}">${q}</button>`;
      }
    });

    row.innerHTML = html;

    row.querySelectorAll('.quality-btn').forEach(btn => {
      btn.onclick = function() {
        row.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const newUrl = btn.getAttribute('data-url');
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        video.src = newUrl;
        video.load();
        video.play().catch(() => {});
      };
    });

    // Highlight first (highest) quality by default
    const firstBtn = row.querySelector('.quality-btn');
    if (firstBtn) firstBtn.classList.add('active');
  }

  function attach() {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls({
        maxBufferLength: 30,
        liveSyncDuration: 6,
        xhrSetup: function(xhr) {
          xhr.withCredentials = false;
        }
      });
      hlsInstance.loadSource(sourceUrl);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, ready);
      hlsInstance.on(Hls.Events.ERROR, function(evt, data) {
        if (!data || !data.fatal) return;
        if ((data.type === Hls.ErrorTypes.NETWORK_ERROR || 
             data.type === Hls.ErrorTypes.MEDIA_ERROR) && retries < 3) {
          retries++;
          try {
            data.type === Hls.ErrorTypes.NETWORK_ERROR ? hlsInstance.startLoad() : hlsInstance.recoverMediaError();
          } catch(e) {}
          return;
        }
        fail('Stream unavailable. Token may be expired.');
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = sourceUrl;
      video.addEventListener('loadedmetadata', ready);
      video.addEventListener('error', () => fail('Stream unavailable.'));
    } else {
      fail('Your browser cannot play this stream.');
    }
  }

  if (window.Hls) {
    attach();
  } else {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
    script.onload = attach;
    script.onerror = () => fail('Could not load player library.');
    document.head.appendChild(script);
  }

  // Keep overlays visible in fullscreen
  video.addEventListener('fullscreenchange', function() {
    const logo = eid('playerLogo');
    const watermark = eid('playerWatermark');
    if (document.fullscreenElement) {
      logo.style.display = 'block';
      watermark.style.display = 'block';
    }
  });

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

/* ── ACTIONS: Share + Add to Calendar ── */
function setupActions(m,start,isLive){
  var section=eid('actionsSection');
  var showCalendar = !isLive && start > new Date();

  section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">Share &amp; Save</span></div>'
    +'<div class="section-body">'
      +'<div class="action-row">'
        +'<button class="action-btn" id="shareBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg> Share Match</button>'
        +(showCalendar?'<button class="action-btn" id="calBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Add to Calendar</button>':'')
      +'</div>'
    +'</div>';

  eid('shareBtn').onclick=function(){
    var shareData={title:m.title,text:'Watch '+m.title+' on Sports Snap',url:location.href};
    if(navigator.share){
      navigator.share(shareData).catch(function(){});
    }else{
      navigator.clipboard.writeText(location.href).then(function(){
        showToast('Link copied to clipboard');
      }).catch(function(){
        showToast('Could not copy link');
      });
    }
  };

  if(showCalendar){
    eid('calBtn').onclick=function(){
      var dtStart=start.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      var end=new Date(start.getTime()+3*3600000);
      var dtEnd=end.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nBEGIN:VEVENT\r\n'
        +'UID:'+m.match_id+'@sportssnap.net\r\n'
        +'DTSTAMP:'+dtStart+'\r\n'
        +'DTSTART:'+dtStart+'\r\n'
        +'DTEND:'+dtEnd+'\r\n'
        +'SUMMARY:'+String(m.title||'').replace(/,/g,'\\,')+'\r\n'
        +'DESCRIPTION:'+String(m.tournament||'').replace(/,/g,'\\,')+' — via Sports Snap\r\n'
        +'END:VEVENT\r\nEND:VCALENDAR';
      var blob=new Blob([ics],{type:'text/calendar'});
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=(m.title||'match').replace(/[^\w\-]+/g,'_')+'.ics';
      document.body.appendChild(a);
      a.click();
      a.remove();
      showToast('Calendar file downloaded');
    };
  }
}

/* ── EVENT DETAILS (category + everything else the feed gives us, minus internal match ID) ── */
function setupDetails(m,start){
  var section=eid('detailsSection');
  var catKey=fcCatClass(m.category);
  var catClass=['cricket','tennis','golf','formula1','motorsports'].indexOf(catKey)>-1?'cat-'+catKey:'cat-default';

  // Collect whichever quality levels the feed actually published for this match
  var qualities=[];
  if(m.auto_streams){
    Object.keys(m.auto_streams).forEach(function(lang){
      var streams=(m.auto_streams[lang]&&m.auto_streams[lang].streams)||{};
      Object.keys(streams).forEach(function(q){ if(qualities.indexOf(q)===-1)qualities.push(q); });
    });
  }
  var qualityOrder=['240p','360p','480p','540p','720p','1080p'];
  qualities.sort(function(a,b){return qualityOrder.indexOf(a)-qualityOrder.indexOf(b);});

  section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">Event Details</span></div>'
    +'<div class="section-body">'
      +'<div class="details-grid">'
        +'<div class="detail-item"><span class="detail-label">Category</span><span class="detail-value"><span class="cat-badge '+catClass+'">'+esc(m.category||'—')+'</span></span></div>'
        +'<div class="detail-item"><span class="detail-label">Tournament</span><span class="detail-value">'+esc(m.tournament||'—')+'</span></div>'
        +'<div class="detail-item"><span class="detail-label">Language</span><span class="detail-value">'+esc(m.language||'—')+'</span></div>'
        +'<div class="detail-item"><span class="detail-label">Start Time</span><span class="detail-value">'+fmtFull(start)+'</span></div>'
        +'<div class="detail-item"><span class="detail-label">Status</span><span class="detail-value">'+esc(m.status||'—')+'</span></div>'
      +'</div>'
      +(qualities.length?'<div class="detail-item" style="margin-top:14px"><span class="detail-label">Available Qualities</span><div class="quality-row">'+qualities.map(function(q){return '<span class="quality-chip">'+q+'</span>';}).join('')+'</div></div>':'')
    +'</div>';
}

/* ── PREDICTION POLL ──
   Shows a head-to-head "Who will win?" poll for any title matching a versus format
   (vs / v / versus, case-insensitive, ignoring trailing round/tournament info).
   For single-entity events (a golf round, an F1 session, etc.) where there's no
   natural two-sided matchup, it falls back to a lightweight "will there be a
   surprise result?" poll instead of hiding the section entirely. */
function setupPrediction(m){
  var section=eid('predictSection');
  var title=String(m.title||'').trim();
  var vsMatch=title.match(/^(.+?)\s+(?:vs\.?|versus|v\.?)\s+(.+?)(?:\s*[-|–].*)?$/i);
  var key='ssnap_vote_'+m.match_id;
  var countsKey='ssnap_votecounts_'+m.match_id;
  var counts=JSON.parse(localStorage.getItem(countsKey)||'null')||{A:0,B:0};
  var myVote=localStorage.getItem(key);

  var teamA,teamB,headingText;
  if(vsMatch){
    teamA=vsMatch[1].trim();
    teamB=vsMatch[2].trim();
    headingText='Who will win?';
  }else{
    teamA='Yes, a surprise result';
    teamB='No, as expected';
    headingText='Predict the Outcome';
  }

  function render(){
    var total=counts.A+counts.B;
    var pctA=total?Math.round(counts.A/total*100):50, pctB=total?100-pctA:50;
    section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">'+headingText+'</span></div>'
      +'<div class="section-body">'
        +'<div class="predict-teams">'
          +'<div class="predict-btn'+(myVote?' voted':'')+(myVote==='A'?' chosen':'')+'" data-pick="A"><span class="pb-fill" style="width:'+(total?pctA:0)+'%"></span><span class="pb-name">'+esc(teamA)+'</span><span class="pb-pct">'+(total?pctA+'%':'—')+'</span></div>'
          +'<div class="predict-btn'+(myVote?' voted':'')+(myVote==='B'?' chosen':'')+'" data-pick="B"><span class="pb-fill" style="width:'+(total?pctB:0)+'%"></span><span class="pb-name">'+esc(teamB)+'</span><span class="pb-pct">'+(total?pctB+'%':'—')+'</span></div>'
        +'</div>'
        +'<div class="predict-note">'+total+' vote'+(total===1?'':'s')+' · tap to vote'+(myVote?' · you picked '+esc(myVote==='A'?teamA:teamB):'')+' · votes are counted on this device only</div>'
      +'</div>';
    section.querySelectorAll('.predict-btn').forEach(function(btn){
      btn.onclick=function(){
        if(localStorage.getItem(key))return;
        var pick=btn.getAttribute('data-pick');
        counts[pick]++;
        localStorage.setItem(countsKey,JSON.stringify(counts));
        localStorage.setItem(key,pick);
        myVote=pick;
        render();
      };
    });
  }
  render();
}

/* ── QUICK REACTIONS ── one-tap hype meter, local tally only, same honest single-vote pattern as the poll ── */
function setupReactions(m){
  var section=eid('reactionSection');
  var countsKey='ssnap_reactions_'+m.match_id;
  var voteKey='ssnap_reactionvote_'+m.match_id;
  var options=[
    {key:'fire',emoji:'🔥',label:'Hype'},
    {key:'thumb',emoji:'👍',label:'Good'},
    {key:'meh',emoji:'😴',label:'Meh'}
  ];
  var counts=JSON.parse(localStorage.getItem(countsKey)||'null')||{fire:0,thumb:0,meh:0};
  var myVote=localStorage.getItem(voteKey);

  function render(){
    section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">Quick Reactions</span></div>'
      +'<div class="section-body">'
        +'<div class="reaction-bar">'
        +options.map(function(o){
          return '<div class="reaction-btn'+(myVote===o.key?' chosen':'')+'" data-key="'+o.key+'">'
            +'<span class="r-emoji">'+o.emoji+'</span>'
            +'<span class="r-count">'+counts[o.key]+'</span>'
            +'<span class="r-label">'+o.label+'</span>'
          +'</div>';
        }).join('')
        +'</div>'
        +'<div class="reaction-note">Tap how you feel about this event — visible on this device only.</div>'
      +'</div>';
    section.querySelectorAll('.reaction-btn').forEach(function(btn){
      btn.onclick=function(){
        if(myVote)return;
        var k=btn.getAttribute('data-key');
        counts[k]++;
        localStorage.setItem(countsKey,JSON.stringify(counts));
        localStorage.setItem(voteKey,k);
        myVote=k;
        render();
        var el=section.querySelector('.reaction-btn[data-key="'+k+'"]');
        if(el){el.classList.add('pop');setTimeout(function(){el.classList.remove('pop');},400);}
      };
    });
  }
  render();
}

/* ── MORE LIKE THIS: other matches in the same category ── */
function setupRelated(m){
  var section=eid('relatedSection');
  var others=allMatchesData.filter(function(x){
    return String(x.match_id)!==String(m.match_id) && (x.category||'')===(m.category||'');
  });
  others.sort(function(a,b){
    var aLive=String(a.status||'').toUpperCase()==='LIVE',bLive=String(b.status||'').toUpperCase()==='LIVE';
    if(aLive!==bLive)return aLive?-1:1;
    return parseFcDate(a.startTime)-parseFcDate(b.startTime);
  });
  others=others.slice(0,8);

  section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">More '+esc(m.category||'')+' Events</span></div>'
    +'<div class="section-body">'
      +(others.length
        ? '<div class="related-scroll">'+others.map(function(x){
            var isLive=String(x.status||'').toUpperCase()==='LIVE';
            return '<div class="related-card" onclick="location.href=\'?id='+encodeURIComponent(x.match_id)+'\'">'
              +'<div class="related-img"><img src="'+esc(x.image||'')+'" alt="'+esc(x.title)+'" onerror="this.style.opacity=0"/></div>'
              +'<div class="related-body">'
                +'<div class="related-title">'+esc(x.title)+'</div>'
                +'<span class="related-status '+(isLive?'live':'upcoming')+'">'+(isLive?'● LIVE':'Upcoming')+'</span>'
              +'</div>'
            +'</div>';
          }).join('')+'</div>'
        : '<p class="related-empty">No other events in this category right now.</p>')
    +'</div>';
}

/* ── COMMENTS ──
   Stored in this browser's localStorage only (this is a static page with no server), so
   comments are visible on the device that posted them, not shared across all visitors.
   For a real shared comment wall you'd need a small backend (e.g. Firebase/Supabase) —
   happy to wire that up if you want it. */
function setupComments(m){
  var storeKey='ssnap_comments_'+m.match_id;
  var list=eid('commentList');
  var nameInput=eid('cName');
  var textInput=eid('cText');
  var postBtn=eid('postBtn');

  var savedName=localStorage.getItem('ssnap_username');
  if(savedName)nameInput.value=savedName;

  function getComments(){ return JSON.parse(localStorage.getItem(storeKey)||'[]'); }
  function timeAgo(ts){
    var diff=Date.now()-ts, m=Math.floor(diff/60000);
    if(m<1)return'just now';
    if(m<60)return m+'m ago';
    var h=Math.floor(m/60); if(h<24)return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }
  function renderList(){
    var items=getComments();
    if(!items.length){ list.innerHTML='<p class="comment-empty">No comments yet — be the first to share your thoughts.</p>'; return; }
    list.innerHTML=items.slice().reverse().map(function(c){
      var initial=(c.name||'?').trim().charAt(0).toUpperCase()||'?';
      return '<div class="comment-item">'
        +'<div class="comment-head"><span class="comment-avatar">'+esc(initial)+'</span><span class="comment-name">'+esc(c.name)+'</span><span class="comment-time">'+timeAgo(c.ts)+'</span></div>'
        +'<div class="comment-text">'+esc(c.text)+'</div>'
      +'</div>';
    }).join('');
  }
  renderList();

  postBtn.onclick=function(){
    var name=nameInput.value.trim()||'Guest';
    var text=textInput.value.trim();
    if(!text)return;
    localStorage.setItem('ssnap_username',name);
    var items=getComments();
    items.push({name:name,text:text,ts:Date.now()});
    localStorage.setItem(storeKey,JSON.stringify(items));
    textInput.value='';
    renderList();
  };
}

  /* Header Script */
  function eid(id){return document.getElementById(id)}

/* Night Mode */
if(localStorage.getItem('night')==='1')document.body.classList.add('night');
eid('nightToggle').addEventListener('click',function(){
  localStorage.setItem('night',document.body.classList.toggle('night')?'1':'0');
});

/* Mobile Menu */
var menuBtn=eid('menuBtn'),mobNav=eid('mobNav');
function closeMobNav(){menuBtn.classList.remove('open');mobNav.classList.remove('open');menuBtn.setAttribute('aria-expanded','false');mobNav.setAttribute('aria-hidden','true');}
menuBtn.addEventListener('click',function(){
  var open=menuBtn.classList.toggle('open');
  mobNav.classList.toggle('open',open);
  menuBtn.setAttribute('aria-expanded',String(open));
  mobNav.setAttribute('aria-hidden',String(!open));
});
mobNav.addEventListener('click',function(e){if(e.target===mobNav)closeMobNav();});
  /* Header Script End */
</script>
