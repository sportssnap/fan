<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1"/>
<meta name="referrer" content="no-referrer"/>
<title>Match Center | Sports Snap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f5f6f8;--surface:#ffffff;--border:#e4e6eb;--text:#111827;--muted:#6b7280;
  --accent:#f59e0b;--red:#e63946;--green:#16a34a;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06);--sh-md:0 4px 16px rgba(0,0,0,.09);
  --fd:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:15px;line-height:1.55}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;font-size:14px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
.container{max-width:820px;margin:0 auto;padding:0 16px}

/* top bar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center}
.topbar-inner{max-width:820px;margin:0 auto;padding:0 16px;width:100%;display:flex;align-items:center;gap:10px}
.back-link{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--muted)}
.back-link:hover{color:var(--text)}
.topbar .logo-name{font-family:var(--fd);font-size:20px;font-weight:800;margin-left:auto}
.topbar .logo-name span{color:var(--red)}

/* hero */
.hero{position:relative;width:100%;aspect-ratio:16/8;background:#0f1117;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;opacity:.55}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.15) 60%)}
.hero-content{position:absolute;left:0;right:0;bottom:0;padding:18px 16px;z-index:2;color:#fff}
.hero-tags{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tag{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:4px}
.tag-cat{background:rgba(255,255,255,.18);color:#fff;backdrop-filter:blur(4px)}
.tag-live{background:var(--red);animation:blink 1.4s ease infinite}
.tag-upcoming{background:#263545}
.hero-title{font-family:var(--fd);font-size:26px;font-weight:800;line-height:1.15;letter-spacing:.01em;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.hero-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}

/* main content */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-top:16px;overflow:hidden}
.section-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:#fafbfc}
.section-head .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulseDot 1.6s ease infinite}
.section-title{font-family:var(--fd);font-size:15px;font-weight:800;letter-spacing:.03em}
.section-body{padding:16px}

/* status row */
.status-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.status-chip{font-family:var(--fd);font-size:14px;font-weight:700;padding:6px 14px;border-radius:var(--r-sm);letter-spacing:.02em}
.status-chip.live{background:var(--red);color:#fff;animation:blink 1.4s ease infinite}
.status-chip.soon{background:var(--green);color:#fff}
.status-chip.upcoming{background:#263545;color:#fff}
.status-meta{font-size:13px;color:var(--muted)}
.status-meta b{color:var(--text)}

/* player */
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r-md);overflow:hidden}
.player-wrap video{width:100%;height:100%;background:#000}
.player-overlay{position:absolute;z-index:5;pointer-events:none;user-select:none}
.player-logo{top:12px;right:12px;width:74px;height:38px;border-radius:6px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,.5);opacity:.95}
.player-logo img{width:100%;height:100%;object-fit:contain;background:rgba(0,0,0,.3)}
.player-watermark{bottom:14px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:14px;letter-spacing:.05em;color:#fff;opacity:.85;text-shadow:0 0 6px rgba(0,0,0,.9);white-space:nowrap}
.player-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#cbd2e0;text-align:center;padding:20px;z-index:6}
.player-msg .ring{width:34px;height:34px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.player-msg p{font-size:13px;max-width:340px}

/* prediction */
.predict-teams{display:flex;flex-direction:column;gap:10px}
.predict-btn{position:relative;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);cursor:pointer;overflow:hidden;transition:border-color .2s}
.predict-btn:hover{border-color:var(--accent)}
.predict-btn.voted{cursor:default}
.predict-btn .pb-fill{position:absolute;left:0;top:0;bottom:0;background:rgba(245,158,11,.16);z-index:0;transition:width .5s ease}
.predict-btn.chosen .pb-fill{background:rgba(245,158,11,.35)}
.predict-btn .pb-name{position:relative;z-index:1;font-family:var(--fd);font-size:16px;font-weight:700}
.predict-btn .pb-pct{position:relative;z-index:1;font-family:var(--fd);font-size:15px;font-weight:800;color:var(--muted)}
.predict-btn.chosen .pb-pct{color:var(--accent)}
.predict-note{margin-top:10px;font-size:12px;color:var(--muted)}
.predict-empty{font-size:13px;color:var(--muted)}

/* comments */
.comment-form{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.comment-form input,.comment-form textarea{padding:10px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--text)}
.comment-form textarea{resize:vertical;min-height:70px}
.comment-post-row{display:flex;justify-content:flex-end}
.post-btn{background:var(--accent);color:#111;font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:.03em;padding:9px 22px;border-radius:var(--r-sm);transition:transform .15s}
.post-btn:hover{transform:translateY(-1px)}
.post-btn:disabled{opacity:.5;cursor:default;transform:none}
.comment-list{display:flex;flex-direction:column;gap:12px}
.comment-item{border-top:1px solid var(--border);padding-top:12px}
.comment-item:first-child{border-top:none;padding-top:0}
.comment-head{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.comment-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#111;font-family:var(--fd);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-name{font-weight:600;font-size:13.5px}
.comment-time{font-size:11.5px;color:var(--muted)}
.comment-text{font-size:14px;color:var(--text);margin-left:34px;word-break:break-word}
.comment-empty{font-size:13px;color:var(--muted)}

.not-found{padding:60px 16px;text-align:center;color:var(--muted)}
.not-found a{color:var(--accent);font-weight:600}

.footer-note{margin:24px 0 40px;text-align:center;font-size:12px;color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="back-link" href="https://sportssnap.net">← Back to Sports Snap</a>
    <div class="logo-name">Sports<span>Snap</span></div>
  </div>
</div>

<div id="app"></div>

<script>
function eid(id){return document.getElementById(id)}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function qs(name){
  return new URLSearchParams(location.search).get(name);
}

/* ── date parsing (same convention as the main site: "20 July 2026 02:30 PM" in IST) ── */
function parseFcDate(str){
  var months={January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',July:'07',August:'08',September:'09',October:'10',November:'11',December:'12'};
  var m=String(str||'').match(/(\d{1,2}) (\w+) (\d{4}) (\d{1,2}):(\d{2}) (AM|PM)/);
  if(!m)return new Date(str);
  var day=('0'+m[1]).slice(-2),month=months[m[2]]||'01',year=m[3];
  var hour=parseInt(m[4],10),min=m[5],ap=m[6];
  if(ap==='PM'&&hour!==12)hour+=12;
  if(ap==='AM'&&hour===12)hour=0;
  hour=('0'+hour).slice(-2);
  return new Date(year+'-'+month+'-'+day+'T'+hour+':'+min+':00+05:30');
}
function formatCountdown(ms){
  if(ms<0)ms=0;
  var s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>0)return d+'d '+h+'h '+m+'m';
  if(h>0)return h+'h '+m+'m '+sec+'s';
  return m+'m '+sec+'s';
}
function fcCatClass(cat){
  var key=String(cat||'').toLowerCase().replace(/\s+/g,'');
  return key;
}
function fmtFull(d){
  return d.toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

var matchId=qs('id');
var app=eid('app');

fetch('https://raw.githubusercontent.com/kajju027/Fancode-Events-Json/refs/heads/main/fancode.json')
  .then(function(r){return r.json();})
  .then(function(data){
    var m=(data.matches||[]).find(function(x){return String(x.match_id)===String(matchId);});
    if(!m){ renderNotFound(); return; }
    renderMatch(m);
  })
  .catch(function(){ renderNotFound(true); });

function renderNotFound(isError){
  app.innerHTML='<div class="container"><div class="not-found">'
    +'<p>'+(isError?'⚠️ Could not load match data. Please refresh.':'Match not found.')+'</p>'
    +'<p style="margin-top:10px"><a href="https://sportssnap.net">Go back to Sports Snap</a></p>'
  +'</div></div>';
}

function renderMatch(m){
  var start=parseFcDate(m.startTime);
  var isLive=String(m.status||'').toUpperCase()==='LIVE';
  var catKey=fcCatClass(m.category);

  app.innerHTML=
    '<div class="hero">'
      +'<img id="heroImg" src="'+esc(m.image||'')+'" alt="'+esc(m.title)+'" onerror="this.style.display=\'none\'"/>'
      +'<div class="hero-content">'
        +'<div class="hero-tags">'
          +'<span class="tag tag-cat">'+esc(m.category||'')+'</span>'
          +(isLive?'<span class="tag tag-live">● LIVE</span>':'<span class="tag tag-upcoming" id="heroCountdown">Upcoming</span>')
        +'</div>'
        +'<div class="hero-title">'+esc(m.title)+'</div>'
        +'<div class="hero-sub">'+esc(m.tournament||'')+'</div>'
      +'</div>'
    +'</div>'
    +'<div class="container">'

      +'<div class="section" id="statusSection">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Match Status</span></div>'
        +'<div class="section-body">'
          +'<div class="status-row">'
            +'<span class="status-chip" id="statusChip"></span>'
            +'<span class="status-meta">Starts <b>'+fmtFull(start)+'</b> (your local time)</span>'
          +'</div>'
        +'</div>'
      +'</div>'

      +'<div class="section">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Watch</span></div>'
        +'<div class="section-body">'
          +'<div class="player-wrap" id="playerWrap"></div>'
        +'</div>'
      +'</div>'

      +'<div class="section" id="predictSection"></div>'

      +'<div class="section">'
        +'<div class="section-head"><span class="dot"></span><span class="section-title">Comments</span></div>'
        +'<div class="section-body">'
          +'<div class="comment-form">'
            +'<input id="cName" type="text" placeholder="Your name" maxlength="40"/>'
            +'<textarea id="cText" placeholder="Say something about this match…" maxlength="500"></textarea>'
            +'<div class="comment-post-row"><button class="post-btn" id="postBtn">Post</button></div>'
          +'</div>'
          +'<div class="comment-list" id="commentList"></div>'
        +'</div>'
      +'</div>'

      +'<p class="footer-note">Sports Snap does not host or store any media. Match data is provided by third-party public feeds and may be delayed or inaccurate.</p>'
    +'</div>';

  updateStatus(m,start,isLive);
  setInterval(function(){updateStatus(m,start,isLive);},1000);

  setupPlayer(m,isLive);
  setupPrediction(m);
  setupComments(m);
}

function updateStatus(m,start,isLiveFixed){
  var chip=eid('statusChip');
  if(!chip)return;
  var now=new Date();
  var isLive=isLiveFixed; // FanCode's own status flag is authoritative (no end-time is provided by the feed)
  if(isLive){
    chip.className='status-chip live';
    chip.textContent='● LIVE NOW';
  }else{
    var diff=start-now;
    var hc=eid('heroCountdown');
    if(diff<=0){
      chip.className='status-chip soon';
      chip.textContent='Starting soon';
      if(hc)hc.textContent='Starting soon';
    }else{
      chip.className='status-chip '+(diff<3600000?'soon':'upcoming');
      chip.textContent='⏱ Starts in '+formatCountdown(diff);
      if(hc)hc.textContent='⏱ '+formatCountdown(diff);
    }
  }
}

/* ── PLAYER ──
   Notes on what this does and doesn't do:
   - Plays the match's "primary" auto-stream only (the one the feed marks as directly playable).
   - The bd/np/lk backup CDN entries are intentionally NOT used — they're regional
     mirrors that aren't meant for general playback and aren't reliable/legit sources to pull from here.
   - This does NOT include any DRM key-bypass or third-party circumvention proxy. Adding a
     proxy specifically to defeat FanCode's hotlink/access protections, or hardcoding DRM
     ClearKeys to decrypt a paid feed (as in the reference PPV example), is exactly the kind
     of unauthorized redistribution of paid content I'm not able to help build — regardless of framing.
     If you have your own licensed/legitimate stream source, just drop its URL into
     `sourceUrl` below and this player will handle it normally.
*/
function setupPlayer(m,isLive){
  var wrap=eid('playerWrap');
  var sourceUrl=(m.streams&&m.streams.primary)?m.streams.primary:'';

  if(!isLive || !sourceUrl){
    wrap.innerHTML='<div class="player-msg"><p>'+(isLive?'No playable stream is available for this event right now.':'The player will appear here once this event goes live.')+'</p></div>';
    return;
  }

  wrap.innerHTML=
    '<video id="fcVideo" controls playsinline muted></video>'
    +'<div class="player-overlay player-logo"><img src="https://i.ibb.co/BTM5dLF/sportssnap-logo.png" alt="Sports Snap"/></div>'
    +'<div class="player-overlay player-watermark">sportssnap.net</div>'
    +'<div class="player-msg" id="playerMsg"><div class="ring"></div><p>Loading stream…</p></div>';

  var video=eid('fcVideo');
  var msg=eid('playerMsg');

  function ready(){ if(msg)msg.remove(); video.muted=false; video.play().catch(function(){}); }
  function fail(text){ if(msg){ msg.querySelector('.ring').style.display='none'; msg.querySelector('p').textContent=text||'Playback failed.'; } }

  var script=document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js';
  script.onload=function(){
    if(window.Hls && Hls.isSupported()){
      var hls=new Hls({});
      hls.loadSource(sourceUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,ready);
      hls.on(Hls.Events.ERROR,function(evt,data){ if(data && data.fatal) fail('Stream unavailable ('+data.type+').'); });
    }else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src=sourceUrl;
      video.addEventListener('loadedmetadata',ready);
      video.addEventListener('error',function(){fail('Stream unavailable.');});
    }else{
      fail('Your browser cannot play this stream format.');
    }
  };
  script.onerror=function(){ fail('Could not load the video player.'); };
  document.head.appendChild(script);

  if('wakeLock' in navigator){ navigator.wakeLock.request('screen').catch(function(){}); }
}

/* ── PREDICTION POLL ── */
function setupPrediction(m){
  var section=eid('predictSection');
  var vsMatch=String(m.title||'').match(/^(.*?)\s+Vs\s+(.*)$/i);
  if(!vsMatch){
    section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">Prediction</span></div>'
      +'<div class="section-body"><p class="predict-empty">No head-to-head prediction available for this event.</p></div>';
    return;
  }
  var teamA=vsMatch[1].trim(), teamB=vsMatch[2].trim();
  var key='ssnap_vote_'+m.match_id;
  var countsKey='ssnap_votecounts_'+m.match_id;

  // Seed a stable pseudo base count per match so the poll doesn't look empty on first visit.
  // These numbers are simulated on your device only — this is a static page with no shared
  // backend, so vote totals aren't synced across visitors.
  function seedHash(str){
    var h=0;
    for(var i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))|0;}
    return Math.abs(h);
  }
  var counts=JSON.parse(localStorage.getItem(countsKey)||'null');
  if(!counts){
    var base=40+(seedHash(String(m.match_id))%180);
    var splitA=30+(seedHash(teamA)%40); // 30–70%
    counts={A:Math.round(base*splitA/100), B:Math.round(base*(100-splitA)/100)};
    localStorage.setItem(countsKey,JSON.stringify(counts));
  }
  var myVote=localStorage.getItem(key);

  function render(){
    var total=counts.A+counts.B||1;
    var pctA=Math.round(counts.A/total*100), pctB=100-pctA;
    section.innerHTML='<div class="section-head"><span class="dot"></span><span class="section-title">Who will win?</span></div>'
      +'<div class="section-body">'
        +'<div class="predict-teams">'
          +'<div class="predict-btn'+(myVote?' voted':'')+(myVote==='A'?' chosen':'')+'" data-pick="A"><span class="pb-fill" style="width:'+pctA+'%"></span><span class="pb-name">'+esc(teamA)+'</span><span class="pb-pct">'+pctA+'%</span></div>'
          +'<div class="predict-btn'+(myVote?' voted':'')+(myVote==='B'?' chosen':'')+'" data-pick="B"><span class="pb-fill" style="width:'+pctB+'%"></span><span class="pb-name">'+esc(teamB)+'</span><span class="pb-pct">'+pctB+'%</span></div>'
        +'</div>'
        +'<div class="predict-note">'+total+' votes · tap a team to vote'+(myVote?' · you voted '+esc(myVote==='A'?teamA:teamB):'')+'</div>'
      +'</div>';
    section.querySelectorAll('.predict-btn').forEach(function(btn){
      btn.onclick=function(){
        if(localStorage.getItem(key))return;
        var pick=btn.getAttribute('data-pick');
        counts[pick]++;
        localStorage.setItem(countsKey,JSON.stringify(counts));
        localStorage.setItem(key,pick);
        myVote=pick;
        render();
      };
    });
  }
  render();
}

/* ── COMMENTS ──
   Stored in this browser's localStorage only (this is a static page with no server), so
   comments are visible on the device that posted them, not shared across all visitors.
   For a real shared comment wall you'd need a small backend (e.g. Firebase/Supabase) —
   happy to wire that up if you want it. */
function setupComments(m){
  var storeKey='ssnap_comments_'+m.match_id;
  var list=eid('commentList');
  var nameInput=eid('cName');
  var textInput=eid('cText');
  var postBtn=eid('postBtn');

  var savedName=localStorage.getItem('ssnap_username');
  if(savedName)nameInput.value=savedName;

  function getComments(){ return JSON.parse(localStorage.getItem(storeKey)||'[]'); }
  function timeAgo(ts){
    var diff=Date.now()-ts, m=Math.floor(diff/60000);
    if(m<1)return'just now';
    if(m<60)return m+'m ago';
    var h=Math.floor(m/60); if(h<24)return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }
  function renderList(){
    var items=getComments();
    if(!items.length){ list.innerHTML='<p class="comment-empty">No comments yet — be the first to share your thoughts.</p>'; return; }
    list.innerHTML=items.slice().reverse().map(function(c){
      var initial=(c.name||'?').trim().charAt(0).toUpperCase()||'?';
      return '<div class="comment-item">'
        +'<div class="comment-head"><span class="comment-avatar">'+esc(initial)+'</span><span class="comment-name">'+esc(c.name)+'</span><span class="comment-time">'+timeAgo(c.ts)+'</span></div>'
        +'<div class="comment-text">'+esc(c.text)+'</div>'
      +'</div>';
    }).join('');
  }
  renderList();

  postBtn.onclick=function(){
    var name=nameInput.value.trim()||'Guest';
    var text=textInput.value.trim();
    if(!text)return;
    localStorage.setItem('ssnap_username',name);
    var items=getComments();
    items.push({name:name,text:text,ts:Date.now()});
    localStorage.setItem(storeKey,JSON.stringify(items));
    textInput.value='';
    renderList();
  };
}
</script>
</body>
</html>
