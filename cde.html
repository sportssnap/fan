<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sports Snap</title>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e){
  var k = e.key ? e.key.toUpperCase() : '';
  var blocked =
    k === 'F12' ||
    ((e.ctrlKey || e.metaKey) && e.shiftKey && (k === 'I' || k === 'J' || k === 'C')) ||
    ((e.ctrlKey || e.metaKey) && (k === 'U' || k === 'S'));
  if(blocked){ e.preventDefault(); e.stopPropagation(); return false; }
}, true);
(function(){
  try{ setInterval(function(){ console.clear && console.clear(); }, 800); }catch(e){}
})();
(function(){
  var triggered = false;
  var strikes = 0;
  var STRIKES_NEEDED = 3;
  function trip(){
    if(triggered) return;
    triggered = true;
    try{ document.documentElement.innerHTML = ''; document.title=''; }catch(e){}
    try{ window.location.replace('about:blank'); }catch(e){}
    try{ window.close(); }catch(e){}
  }
  var threshold = 160;
  var inFrame = (window.top !== window.self);
  function sizeCheck(){
    if(inFrame) return false; // outerWidth/innerWidth is meaningless inside an iframe (e.g. a host site's editor/preview) — skip to avoid false positives
    var wDiff = window.outerWidth - window.innerWidth > threshold;
    var hDiff = window.outerHeight - window.innerHeight > threshold;
    return wDiff || hDiff;
  }
  function timingCheck(){
    var t0 = performance.now();
    debugger;
    var t1 = performance.now();
    return (t1 - t0) > 150;
  }
  setInterval(function(){
    var positive = sizeCheck() || timingCheck();
    if(positive){
      strikes++;
      if(strikes >= STRIKES_NEEDED) trip();
    } else {
      strikes = 0; // reset on a clean reading so transient blips (tab switch, GC pause, slow device) don't accumulate into a false trip
    }
  }, 400);
})();
</script>

function rotateBack(str, shift){
  var out = '';
  for(var i=0;i<str.length;i++){
    var c = str.charCodeAt(i);
    if(c>=32 && c<=126){ c = ((c - 32 - shift) % 95 + 95) % 95 + 32; }
    out += String.fromCharCode(c);
  }
  return out;
}
